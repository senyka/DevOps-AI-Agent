version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: devops_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - devops_net
    restart: unless-stopped

  neo4j:
    image: neo4j:5.12
    environment:
      NEO4J_AUTH: neo4j/secure_password_change_me
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./config/neo4j.conf:/etc/neo4j/neo4j.conf
    networks:
      - devops_net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./config/qdrant.yaml:/qdrant/config/production.yaml
    networks:
      - devops_net
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://devops:secure_password_change_me@postgres:5432/devops_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=secure_password_change_me
      - QDRANT_URL=http://qdrant:6333
      - LLM_API_BASE=http://vllm:8000/v1
      - DOCKER_EXECUTOR_URL=http://docker-executor:5001
      - LOG_LEVEL=INFO
    depends_on:
      - postgres
      - neo4j
      - qdrant
      - docker-executor
    networks:
      - devops_net
    restart: unless-stopped
    # ВАЖНО: docker.sock больше не монтируется сюда

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://devops:secure_password_change_me@postgres:5432/devops_db
    depends_on:
      - redis
      - postgres
    networks:
      - devops_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - devops_net
    restart: unless-stopped

  # Новый сервис для безопасного выполнения Docker команд
  docker-executor:
    build:
      context: ./docker-executor
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ALLOWED_COMMANDS=ps,logs,inspect,version,info
    networks:
      - devops_net
    restart: unless-stopped
    # Доступ только внутри сети, наружу не пробрасываем

networks:
  devops_net:
    driver: bridge

volumes:
  pg_data:
  neo4j_data:
  qdrant_data:
