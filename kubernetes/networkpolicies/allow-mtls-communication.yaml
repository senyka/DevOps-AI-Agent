apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mtls-communication
  namespace: devops-agent
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              mtls-enabled: "true"
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - podSelector:
            matchLabels:
              mtls-enabled: "true"
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8443
        - protocol: TCP
          port: 9090
