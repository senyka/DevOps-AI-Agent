apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-docker-executor-ingress
  namespace: devops-agent
spec:
  podSelector:
    matchLabels:
      app: docker-executor
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: agent
      ports:
        - protocol: TCP
          port: 5001
