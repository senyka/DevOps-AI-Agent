apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: devops-agent
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "devops-agent"
    vault.hashicorp.com/agent-inject-secret-db-creds.txt: "secret/data/devops/database"
    vault.hashicorp.com/agent-inject-template-db-creds.txt: |
      {{- with secret "secret/data/devops/database" -}}
      POSTGRES_PASSWORD={{ .Data.data.password }}
      NEO4J_PASSWORD={{ .Data.data.neo4j_password }}
      GITLAB_TOKEN={{ .Data.data.gitlab_token }}
      {{- end }}
type: Opaque
stringData: {}
