apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: devops-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent
      mtls-enabled: "true"
  template:
    metadata:
      labels:
        app: agent
        mtls-enabled: "true"
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "devops-agent"
        vault.hashicorp.com/agent-inject-secret-creds.txt: "secret/data/devops/database"
        vault.hashicorp.com/agent-inject-template-creds.txt: |
          {{- with secret "secret/data/devops/database" -}}
          export POSTGRES_PASSWORD="{{ .Data.data.password }}"
          export NEO4J_PASSWORD="{{ .Data.data.neo4j_password }}"
          export GITLAB_TOKEN="{{ .Data.data.gitlab_token }}"
          {{- end }}
    spec:
      serviceAccountName: devops-agent-sa
      containers:
        - name: agent
          image: devops-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: agent-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-secrets
                  key: NEO4J_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: REDIS_PASSWORD
            - name: VAULT_ADDR
              value: "http://vault.devops-agent.svc.cluster.local:8200"
            - name: VAULT_ROLE
              value: "devops-agent"
            - name: VAULT_KV_MOUNT
              value: "secret"
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tls-certs
          secret:
            secretName: agent-tls-secret
            optional: true
