apiVersion: secrets-store.csi.k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-devops-agent
  namespace: devops-agent
spec:
  provider: vault
  parameters:
    objects: |
      - objectName: "database-password"
        secretPath: "secret/data/devops/database"
        secretKey: "postgres_password"
      - objectName: "neo4j-password"
        secretPath: "secret/data/devops/database"
        secretKey: "neo4j_password"
      - objectName: "gitlab-token"
        secretPath: "secret/data/devops/database"
        secretKey: "gitlab_token"
      - objectName: "redis-password"
        secretPath: "secret/data/devops/redis"
        secretKey: "password"
    roleName: "devops-agent"
    vaultAddress: "https://vault-active.vault.svc.cluster.local:8200"
    vaultCACert: |
      -----BEGIN CERTIFICATE-----
      <VAULT_CA_CERT>
      -----END CERTIFICATE-----
    vaultTLSVerify: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-agent
  namespace: devops-agent
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "devops-agent"
    vault.hashicorp.com/agent-inject-secret-db-credentials.txt: "secret/data/devops/database"
    vault.hashicorp.com/agent-inject-template-db-credentials.txt: |
      {{- with secret "secret/data/devops/database" -}}
      POSTGRES_PASSWORD={{ .Data.data.postgres_password }}
      NEO4J_PASSWORD={{ .Data.data.neo4j_password }}
      GITLAB_TOKEN={{ .Data.data.gitlab_token }}
      {{- end }}
